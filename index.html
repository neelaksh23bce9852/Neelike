<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelike Retail Shop | Premium Order Experience</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Spline Background */
        .spline-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Content Wrapper */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 20px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        /* Button Styling */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 12px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Success Message Container */
        #success-message {
            display: none;
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-content {
            padding: 24px 0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: #22c55e;
            font-size: 32px;
        }

        .success-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Animations */
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .content-wrapper {
                padding: 16px;
            }

            .card {
                padding: 32px 24px;
                border-radius: 24px;
            }

            h1 {
                font-size: 2rem;
            }
        }

        /* Smooth Hide/Show transition */
        .hidden {
            display: none !important;
        }

        .visible {
            display: block !important;
            opacity: 1 !important;
            transform: scale(1) !important;
        }
    </style>
</head>

<body>

    <!-- Background Spline Scene -->
    <div class="spline-container">
        <!-- Official Iframe Embed Format with the requested scene -->
        <iframe src="https://my.spline.design/ejnge3eCKsXo0-cm/" loading="lazy"></iframe>
    </div>

    <div class="content-wrapper">
        <div class="card" id="form-card">
            <header>
                <h1>Neelike Retail</h1>
                <p class="subtitle">Premium Product Selection</p>
            </header>

            <form id="orderForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Jane Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="+1 (555) 000-0000" required autocomplete="tel">
                </div>

                <div class="form-group">
                    <label for="productRequired">Product Required</label>
                    <input type="text" id="productRequired" placeholder="Premium Watch" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Submit Request
                </button>
            </form>
        </div>

        <div class="card hidden" id="success-card">
            <div id="success-message">
                <div class="success-content">
                    <h2 class="success-title">Order request received.</h2>
                    <p class="subtitle">We will contact you soon.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Visual feedback on button
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Sending...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Simulate slight delay for premium feel
            setTimeout(() => {
                const formCard = document.getElementById('form-card');
                const successCard = document.getElementById('success-card');
                const successMsg = document.getElementById('success-message');

                // Transition to success state
                formCard.style.opacity = '0';
                formCard.style.transform = 'translateY(-20px)';

                setTimeout(() => {
                    formCard.classList.add('hidden');
                    successCard.classList.remove('hidden');

                    // Trigger success animation
                    setTimeout(() => {
                        successMsg.classList.add('visible');
                    }, 50);
                }, 300);

            }, 800);
        });

        // Prevention of accidental reloads
        window.onbeforeunload = function () {
            if (document.getElementById('orderForm').classList.contains('active')) {
                return "Are you sure you want to leave?";
            }
        };
    </script>
</body>

</html>
